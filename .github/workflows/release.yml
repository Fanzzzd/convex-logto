name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write # changesets opens/updates the "Version Packages" PR
  pull-requests: write # changesets opens/updates the "Version Packages" PR
  id-token: write # OIDC trusted publishing to npm (provenance, no token)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) requires npm >= 11.5.1; the runner ships older.
      # Pin the major to avoid a future npm release silently changing publish behavior.
      - name: Update npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - run: pnpm install --frozen-lockfile

      # Verify the published library before releasing (scoped — docs deploys via Vercel).
      - run: pnpm --filter convex-logto lint

      - run: pnpm --filter convex-logto format:check

      - run: pnpm --filter convex-logto check-types

      - run: pnpm --filter convex-logto test

      - run: pnpm --filter convex-logto build

      - run: pnpm --filter convex-logto lint:package

      - name: Create "Version Packages" PR or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: publishing authenticates via OIDC trusted publishing.
