name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Scoped to the published library; the docs site is built/deployed by Vercel.
      - name: Lint (oxlint)
        run: pnpm --filter convex-logto lint

      - name: Format check (oxfmt)
        run: pnpm --filter convex-logto format:check

      - run: pnpm --filter convex-logto check-types

      - run: pnpm --filter convex-logto test

      - run: pnpm --filter convex-logto build

      - name: Validate published package (publint + are-the-types-wrong)
        run: pnpm --filter convex-logto lint:package
